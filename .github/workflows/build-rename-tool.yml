name: Build maket_rename.exe

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4.2.2
      - uses: actions/setup-python@v5.6.0
        with:
          python-version: '3.11'
      - run: pip install pyinstaller
      - run: pyinstaller --onefile --console --name maket_rename tools/maket_rename.py

      - name: Test maket_rename.exe
        shell: pwsh
        run: |
          mkdir test_photos
          echo $null > test_photos\DSC_0001.jpg
          echo $null > test_photos\DSC_0002.jpg
          echo $null > test_photos\DSC_0003.jpg
          "old_name,new_name`nDSC_0001.jpg,ART-001-black_01.jpg`nDSC_0002.jpg,ART-001-black_02.jpg`nDSC_0003.jpg,ART-002-white_01.jpg" | Out-File -Encoding utf8 test_photos\rename_test.csv
          cd test_photos
          ..\dist\maket_rename.exe
          if (!(Test-Path "ART-001-black_01.jpg")) { Write-Error "FAIL: ART-001-black_01.jpg not found"; exit 1 }
          if (!(Test-Path "ART-001-black_02.jpg")) { Write-Error "FAIL: ART-001-black_02.jpg not found"; exit 1 }
          if (!(Test-Path "ART-002-white_01.jpg")) { Write-Error "FAIL: ART-002-white_01.jpg not found"; exit 1 }
          Write-Host "TEST PASSED: all 3 files renamed correctly"

      - uses: softprops/action-gh-release@v2.3.2
        with:
          tag_name: rename-tool
          name: "Maket CP — Rename Tool"
          files: dist/maket_rename.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
