name: Build maket_rename.exe

on:
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install pyinstaller
      - run: pyinstaller --onefile --console --name maket_rename tools/maket_rename.py
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: rename-tool
          name: "Maket CP — Rename Tool"
          files: dist/maket_rename.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
