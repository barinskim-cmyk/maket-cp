<title>Maket CP -- Переименование фото</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f5; color: #333; }

.app-header {
  background: #fff; padding: 12px 20px; border-bottom: 1px solid #e0e0e0;
  display: flex; justify-content: space-between; align-items: center;
  position: sticky; top: 0; z-index: 100;
}
.app-header h1 { font-size: 16px; font-weight: 600; }
.header-stats { display: flex; gap: 16px; font-size: 13px; color: #666; }
.stat-done { color: #2e7d32; font-weight: 600; }
.header-actions { display: flex; gap: 8px; }

.btn { padding: 8px 16px; border: none; border-radius: 6px; font-size: 13px; cursor: pointer; transition: all 0.2s; }
.btn-primary { background: #333; color: #fff; }
.btn-primary:hover { background: #555; }
.btn-outline { background: #fff; color: #333; border: 1px solid #ccc; }
.btn-outline:hover { background: #f0f0f0; }
.btn-danger { background: #c62828; color: #fff; }
.btn-danger:hover { background: #e53935; }
.btn-sm { padding: 4px 10px; font-size: 12px; }

.main-layout { display: flex; height: calc(100vh - 52px); }

/* Cards column */
.cards-col {
  flex: 1; overflow-y: auto; padding: 16px;
  display: flex; flex-direction: column; gap: 8px;
}

.card-row {
  background: #fff; border-radius: 8px; padding: 12px 16px;
  display: flex; align-items: center; gap: 12px;
  border: 2px solid transparent; cursor: pointer;
  transition: all 0.15s;
}
.card-row:hover { border-color: #ccc; }
.card-row.selected { border-color: #333; background: #fafafa; }
.card-row.matched { border-color: #4caf50; background: #f1f8e9; }

.card-num {
  width: 32px; height: 32px; border-radius: 50%;
  background: #e8e8e8; display: flex; align-items: center; justify-content: center;
  font-size: 13px; font-weight: 600; flex-shrink: 0;
}
.card-row.matched .card-num { background: #4caf50; color: #fff; }

.card-cat { font-size: 11px; padding: 2px 8px; border-radius: 10px; font-weight: 500; flex-shrink: 0; }
.cat-shoes { background: #e8f5e9; color: #2e7d32; }
.cat-bag { background: #fce4ec; color: #c62828; }
.cat-glasses { background: #e3f2fd; color: #1565c0; }
.cat-accessory { background: #f3e5f5; color: #7b1fa2; }

.card-photos {
  display: flex; gap: 4px; flex: 1; overflow: hidden;
}
.card-photo-thumb {
  width: 48px; height: 48px; background: #f0f0f0; border-radius: 4px;
  display: flex; align-items: center; justify-content: center;
  font-size: 9px; color: #999; overflow: hidden; flex-shrink: 0;
}
.card-photo-thumb img { width: 100%; height: 100%; object-fit: cover; }

.card-sku-assigned {
  font-size: 12px; font-weight: 600; color: #2e7d32; margin-left: auto; flex-shrink: 0;
  max-width: 220px; text-align: right;
}

.card-clear-btn {
  opacity: 0; cursor: pointer; background: none; border: none; font-size: 16px; color: #c62828;
  flex-shrink: 0; padding: 4px;
}
.card-row:hover .card-clear-btn { opacity: 0.6; }
.card-clear-btn:hover { opacity: 1 !important; }

/* SKU column */
.sku-col {
  width: 320px; border-left: 1px solid #e0e0e0; background: #fff;
  display: flex; flex-direction: column; flex-shrink: 0;
}

.sku-header { padding: 12px 16px; border-bottom: 1px solid #eee; }
.sku-header h3 { font-size: 13px; color: #999; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; }
.sku-filter {
  display: flex; gap: 4px; flex-wrap: wrap;
}
.filter-chip {
  padding: 4px 10px; border-radius: 12px; font-size: 11px; cursor: pointer;
  background: #f0f0f0; color: #666; border: none; transition: all 0.15s;
}
.filter-chip.active { background: #333; color: #fff; }

.sku-list { flex: 1; overflow-y: auto; padding: 8px; display: flex; flex-direction: column; gap: 4px; }

.sku-item {
  display: flex; align-items: center; gap: 10px; padding: 8px 10px;
  border-radius: 6px; cursor: pointer; transition: all 0.15s;
  border: 1px solid transparent;
}
.sku-item:hover { background: #f5f5f5; border-color: #ddd; }
.sku-item.used { opacity: 0.35; }
.sku-item.highlight { background: #fff3e0; border-color: #ff9800; }

.sku-ref-img {
  width: 52px; height: 52px; border-radius: 4px; overflow: hidden; flex-shrink: 0; background: #fafafa;
}
.sku-ref-img img { width: 100%; height: 100%; object-fit: contain; }

.sku-name { font-size: 12px; font-weight: 500; word-break: break-all; }
.sku-model { font-size: 10px; color: #999; }

/* Drop zone */
.drop-zone {
  border: 2px dashed #ccc; border-radius: 8px; padding: 20px; margin: 16px;
  text-align: center; color: #999; font-size: 13px; cursor: pointer;
  transition: all 0.2s;
}
.drop-zone:hover, .drop-zone.drag-over { border-color: #333; background: #fafafa; color: #333; }

/* Export overlay */
.overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 200; align-items: center; justify-content: center; }
.overlay.show { display: flex; }
.overlay-content { background: #fff; border-radius: 12px; padding: 32px; max-width: 700px; width: 90%; max-height: 80vh; overflow-y: auto; }
.overlay-content h2 { margin-bottom: 16px; font-size: 18px; }
.overlay-content pre { background: #f5f5f5; padding: 16px; border-radius: 8px; font-size: 12px; overflow-x: auto; white-space: pre-wrap; word-break: break-all; }
.overlay-content textarea { width: 100%; height: 200px; font-family: monospace; font-size: 12px; padding: 12px; border: 1px solid #ddd; border-radius: 8px; resize: vertical; }
.overlay-close { position: absolute; top: 16px; right: 16px; background: none; border: none; font-size: 24px; cursor: pointer; }

/* Toast */
.toast {
  position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
  background: #333; color: #fff; padding: 10px 20px; border-radius: 8px;
  font-size: 13px; z-index: 300; opacity: 0; transition: opacity 0.3s;
}
.toast.show { opacity: 1; }
</style>

/* State */
var assignments = {}; /* cardIdx -> skuIdx */
var selectedCard = 0;
var catFilter = 'all';
var photoThumbs = {}; /* filename -> dataURL */

/* Category labels */
var CAT_LABELS = { shoes: 'Обувь', bag: 'Сумка', glasses: 'Очки', accessory: 'Аксес.', other: 'Другое' };
var CAT_CSS = { shoes: 'cat-shoes', bag: 'cat-bag', glasses: 'cat-glasses', accessory: 'cat-accessory', other: '' };

/* Try restore from localStorage */
try {
  var saved = localStorage.getItem('rename_assignments');
  if (saved) assignments = JSON.parse(saved);
} catch(e) {}

function saveState() {
  try { localStorage.setItem('rename_assignments', JSON.stringify(assignments)); } catch(e) {}
}

/* Render cards */
function renderCards() {
  var col = document.getElementById('cards-col');
  var dz = document.getElementById('drop-zone');
  var html = '';
  for (var i = 0; i < CARDS.length; i++) {
    var c = CARDS[i];
    var matched = assignments[i] !== undefined;
    var sel = i === selectedCard;
    var cls = 'card-row' + (sel ? ' selected' : '') + (matched ? ' matched' : '');
    html += '<div class="' + cls + '" onclick="selectCard(' + i + ')" data-idx="' + i + '">';
    html += '<div class="card-num">' + c.num + '</div>';
    html += '<span class="card-cat ' + (CAT_CSS[c.cat]||'') + '">' + c.cat_ru + '</span>';
    html += '<div class="card-photos">';
    for (var j = 0; j < c.photos.length; j++) {
      var p = c.photos[j];
      var shortName = p.replace(/2026_03_23_portal/, '').replace('_preview.jpg', '');
      if (photoThumbs[p]) {
        html += '<div class="card-photo-thumb"><img src="' + photoThumbs[p] + '"></div>';
      } else {
        html += '<div class="card-photo-thumb">' + shortName + '</div>';
      }
    }
    html += '</div>';
    if (matched) {
      var sku = SKUS[assignments[i]];
      html += '<div class="card-sku-assigned">' + sku.sku + '</div>';
      html += '<button class="card-clear-btn" onclick="clearAssignment(' + i + ',event)">&times;</button>';
    }
    html += '</div>';
  }
  /* Keep drop zone, replace rest */
  var existing = col.querySelectorAll('.card-row');
  for (var k = existing.length - 1; k >= 0; k--) existing[k].remove();
  dz.insertAdjacentHTML('afterend', html);
  updateStats();
}

/* Render SKU list */
function renderSkus() {
  var list = document.getElementById('sku-list');
  var usedSkus = {};
  for (var k in assignments) usedSkus[assignments[k]] = true;

  /* Determine suggested category from selected card */
  var suggestedCat = CARDS[selectedCard] ? CARDS[selectedCard].cat : '';

  var html = '';
  for (var i = 0; i < SKUS.length; i++) {
    var s = SKUS[i];
    if (catFilter !== 'all' && s.cat !== catFilter) continue;
    var used = usedSkus[i] ? ' used' : '';
    var highlight = (!usedSkus[i] && suggestedCat && s.cat === suggestedCat && catFilter === 'all') ? ' highlight' : '';
    html += '<div class="sku-item' + used + highlight + '" onclick="assignSku(' + i + ')" title="' + s.sku + '">';
    html += '<div class="sku-ref-img"><img src="' + s.ref + '"></div>';
    html += '<div>';
    html += '<div class="sku-name">' + s.sku + '</div>';
    /* Extract model (e.g. PL01350CN-05) and color */
    var parts = s.sku.split('-');
    var color = parts.length > 2 ? parts.slice(-2, -1)[0] : '';
    html += '<div class="sku-model">' + color + '</div>';
    html += '</div></div>';
  }
  list.innerHTML = html;
}

/* Render filter chips */
function renderFilter() {
  var cats = [{id: 'all', label: 'Все'}];
  var seen = {};
  for (var i = 0; i < SKUS.length; i++) {
    if (!seen[SKUS[i].cat]) {
      seen[SKUS[i].cat] = true;
      cats.push({id: SKUS[i].cat, label: CAT_LABELS[SKUS[i].cat] || SKUS[i].cat});
    }
  }
  var html = '';
  for (var i = 0; i < cats.length; i++) {
    var active = catFilter === cats[i].id ? ' active' : '';
    html += '<button class="filter-chip' + active + '" onclick="setFilter(\'' + cats[i].id + '\')">' + cats[i].label + '</button>';
  }
  document.getElementById('sku-filter').innerHTML = html;
}

function selectCard(idx) {
  selectedCard = idx;
  renderCards();
  renderSkus();
  /* Scroll card into view */
  var row = document.querySelector('.card-row[data-idx="' + idx + '"]');
  if (row) row.scrollIntoView({ block: 'nearest' });
}

function assignSku(skuIdx) {
  /* Check if already used */
  for (var k in assignments) {
    if (assignments[k] === skuIdx) {
      toast('Этот артикул уже назначен карточке ' + CARDS[k].num);
      return;
    }
  }
  assignments[selectedCard] = skuIdx;
  saveState();
  /* Auto-advance to next unmatched card */
  var next = -1;
  for (var i = selectedCard + 1; i < CARDS.length; i++) {
    if (assignments[i] === undefined) { next = i; break; }
  }
  if (next === -1) {
    for (var i = 0; i < selectedCard; i++) {
      if (assignments[i] === undefined) { next = i; break; }
    }
  }
  if (next !== -1) selectedCard = next;
  renderCards();
  renderSkus();
  renderFilter();
  toast('Карточка ' + CARDS[selectedCard >= 0 ? (next !== -1 ? selectedCard : selectedCard) : 0].num + ' -- назначен ' + SKUS[skuIdx].sku);
}

function clearAssignment(cardIdx, e) {
  e.stopPropagation();
  delete assignments[cardIdx];
  saveState();
  renderCards();
  renderSkus();
}

function setFilter(cat) {
  catFilter = cat;
  renderFilter();
  renderSkus();
}

function resetAll() {
  if (!confirm('Сбросить все сопоставления?')) return;
  assignments = {};
  saveState();
  selectedCard = 0;
  renderCards();
  renderSkus();
}

function updateStats() {
  var count = Object.keys(assignments).length;
  document.getElementById('stat-matched').textContent = 'Сопоставлено: ' + count + '/' + CARDS.length;
}

/* Export */

/* Photo drop zone */
function dzOver(e) { e.preventDefault(); document.getElementById('drop-zone').classList.add('drag-over'); }
function dzLeave(e) { document.getElementById('drop-zone').classList.remove('drag-over'); }
function dzDrop(e) {
  e.preventDefault();
  document.getElementById('drop-zone').classList.remove('drag-over');
  var items = e.dataTransfer.items;
  if (!items) return;
  var pending = 0;
  for (var i = 0; i < items.length; i++) {
    var entry = items[i].webkitGetAsEntry ? items[i].webkitGetAsEntry() : null;
    if (entry && entry.isDirectory) {
      readDir(entry);
    } else if (items[i].kind === 'file') {
      var file = items[i].getAsFile();
      if (file && file.name.match(/\.(jpg|jpeg|png)$/i)) {
        loadThumb(file);
      }
    }
  }
}

function readDir(dirEntry) {
  var reader = dirEntry.createReader();
  reader.readEntries(function(entries) {
    for (var i = 0; i < entries.length; i++) {
      if (entries[i].isFile && entries[i].name.match(/\.(jpg|jpeg|png)$/i)) {
        entries[i].file(function(f) { loadThumb(f); });
      }
    }
  });
}

function loadThumb(file) {
  var reader = new FileReader();
  reader.onload = function(e) {
    /* Resize to 96px thumb */
    var img = new Image();
    img.onload = function() {
      var canvas = document.createElement('canvas');
      var size = 96;
      canvas.width = size;
      canvas.height = size;
      var ctx = canvas.getContext('2d');
      var scale = Math.max(size / img.width, size / img.height);
      var w = img.width * scale;
      var h = img.height * scale;
      ctx.drawImage(img, (size - w) / 2, (size - h) / 2, w, h);
      photoThumbs[file.name] = canvas.toDataURL('image/jpeg', 0.7);
      renderCards();
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

/* Toast */
function toast(msg) {
  var el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(el._timer);
  el._timer = setTimeout(function() { el.classList.remove('show'); }, 2000);
}

/* Keyboard nav */
document.addEventListener('keydown', function(e) {
  if (e.key === 'ArrowDown' || e.key === 'j') {
    e.preventDefault();
    if (selectedCard < CARDS.length - 1) selectCard(selectedCard + 1);
  } else if (e.key === 'ArrowUp' || e.key === 'k') {
    e.preventDefault();
    if (selectedCard > 0) selectCard(selectedCard - 1);
  } else if (e.key === 'Escape') {
    document.getElementById('export-overlay').classList.remove('show');
  }
});

renderSkus();
